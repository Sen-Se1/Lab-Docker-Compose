<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Docker Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>TaskMaster <span>Pro</span></h1>
            <p class="subtitle">Docker Compose Lab Deployment</p>
        </header>

        <section class="task-form">
            <div class="glass-card">
                <h2>Add New Task</h2>
                <div class="input-group">
                    <input type="text" id="taskTitle" placeholder="Task Title">
                    <input type="text" id="taskDesc" placeholder="Description">
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                    <button id="addTaskBtn">Add Task</button>
                </div>
            </div>
        </section>

        <section class="task-display">
            <div class="task-header">
                <h2>Your Tasks</h2>
                <button id="refreshBtn" class="refresh-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                    </svg>
                </button>
            </div>
            <div id="taskList" class="task-grid">
                <div class="loader">Loading tasks...</div>
            </div>
        </section>

        <footer id="statusFooter">
            Backend: <span id="backendStatus" class="status-indicator">checking...</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
